apiVersion: v1
kind: Secret
metadata:
  name: vault-token
  namespace: demo
type: Opaque
stringData:
  token: "VAULT_TOKEN_PLACEHOLDER"
---
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: demo
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "kv"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: demo
          key: token
